      tags: [Accounting]
      security: [{ bearerAuth: [] }]
      summary: >
        Update an expense. When amount and/or accountId change, the original
        ledger entry is reversed and a new one is posted (Node integrity fix —
        Laravel leaves the ledger untouched on update).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated }
