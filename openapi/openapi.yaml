        preserved as-is per docs/DECISIONS.md.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date, title, categoryId, accountId, amount]
              properties:
                date: { type: string, format: date }
                title: { type: string }
                categoryId: { type: integer }
                accountId: { type: integer, description: "Required (Node divergence from Laravel)" }
                amount: { type: number }
                reference: { type: string, nullable: true }
                note: { type: string, nullable: true }
      responses:
        "201": { description: Created }
