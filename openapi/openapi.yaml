      responses:
        "201": { description: Created }
        "400": { description: Invalid accountTypeId }
  /api/v1/accounts/{id}:
    get:
      tags: [Accounting]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Account }
    patch:
      tags: [Accounting]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated }
    delete:
      tags: [Accounting]
      security: [{ bearerAuth: [] }]
      summary: >
        Delete an account (409 if not deletable — including seeded ids 1-4 —
        or if referenced by ledger transactions/expenses).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Deleted }
        "409": { description: Not deletable / referenced by ledger or expenses }
  /api/v1/ledger-transactions:
    get:
      tags: [Accounting]
      security: [{ bearerAuth: [] }]
      summary: List ledger transactions (filter by accountId, invoiceType, date range)
      parameters:
        - in: query
          name: accountId
          schema: { type: integer }
        - in: query
          name: invoiceType
          schema:
            type: string
            enum: [sale, purchase, expense, manual, sale_return, purchase_return]
        - in: query
          name: dateFrom
          schema: { type: string, format: date }
        - in: query
          name: dateTo
          schema: { type: string, format: date }
      responses:
        "200": { description: Paginated ledger transactions }
    post:
      tags: [Accounting]
      security: [{ bearerAuth: [] }]
      summary: Post a manual journal entry (debitAccountId must differ from creditAccountId; amount > 0)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [debitAccountId, creditAccountId, amount, particular]
              properties:
                date: { type: string, format: date }
                debitAccountId: { type: integer }
                creditAccountId: { type: integer }
                amount: { type: number }
                particular: { type: string }
      responses:
        "201": { description: Created }
        "400": { description: "debitAccountId == creditAccountId, or invalid account" }
  /api/v1/ledger-transactions/{id}:
    get:
      tags: [Accounting]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Ledger transaction }
  /api/v1/reports/accounting/trial-balance:
    get:
      tags: [Accounting]
      security: [{ bearerAuth: [] }]
      summary: Trial balance — per account, Σ debits and Σ credits
      responses:
        "200": { description: Trial balance rows + totals }
  /api/v1/reports/accounting/balance-sheet:
    get:
      tags: [Accounting]
      security: [{ bearerAuth: [] }]
      summary: >
        Balance sheet — CONVENTIONAL debit/credit-normal balances bucketed by
        account type (Node deviates from Laravel's buggy credit-debit-for-all
        formula; see docs/validation/BP6-validation.md).
      responses:
        "200": { description: Balance sheet buckets + totals }
  /api/v1/reports/accounting/income-statement:
    get:
      tags: [Accounting]
      security: [{ bearerAuth: [] }]
      summary: Income statement — revenue, expense, net (conventional signs, no selective abs())
      responses:
        "200": { description: Income statement }
  /api/v1/reports/customer-dues:
    get:
      tags: [Reports]
      security: [{ bearerAuth: [] }]
      summary: Customers with due > 0, sorted descending (shop-scoped, perm report.due_customer)
      responses:
        "200": { description: Customer dues list + meta.generatedAt }
        "403": { description: Missing report.due_customer permission }
  /api/v1/reports/customer-dues/export:
    get:
      tags: [Reports]
      security: [{ bearerAuth: [] }]
      summary: Customer dues report as .xlsx (exceljs) — same perm as the JSON variant
      responses:
        "200":
          description: xlsx file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet: {}
  /api/v1/reports/supplier-payables:
    get:
      tags: [Reports]
      security: [{ bearerAuth: [] }]
      summary: Suppliers with due > 0, sorted descending (shop-scoped, perm report.payable_manufacturer)
      responses:
        "200": { description: Supplier payables list + meta.generatedAt }
  /api/v1/reports/supplier-payables/export:
    get:
      tags: [Reports]
      security: [{ bearerAuth: [] }]
      summary: Supplier payables report as .xlsx
      responses:
        "200":
          description: xlsx file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet: {}
  /api/v1/reports/sale-purchase:
    get:
      tags: [Reports]
      security: [{ bearerAuth: [] }]
      summary: >
        Per-day sales vs. purchases totals for a shop-scoped date range (perm
        report.sale_purchase). Defaults to the current calendar month in the
        shop's timezone when `from`/`to` are omitted; `from > to` -> 400.
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200": { description: Daily rows + totals + meta.generatedAt }
        "400": { description: from > to }
  /api/v1/reports/sale-purchase/export:
    get:
      tags: [Reports]
      security: [{ bearerAuth: [] }]
      summary: Sales vs. purchases report as .xlsx
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200":
          description: xlsx file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet: {}
  /api/v1/reports/profit-loss:
    get:
      tags: [Reports]
      security: [{ bearerAuth: [] }]
      summary: >
        Revenue / cost-of-sales / net profit for a shop-scoped date range (perm
        report.profit_loss). Computed from shop-scoped invoices/purchases
        (revenue − cost) since the global chart-of-accounts Income Statement
        (BP6) is not shop-scoped — see docs/validation/BP7-validation.md.
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200":
          description: "revenue, costOfSales, netProfit + meta.generatedAt"
        "400":
          description: "from > to"
  /api/v1/reports/profit-loss/export:
    get:
      tags: [Reports]
      security: [{ bearerAuth: [] }]
      summary: Profit/loss report as .xlsx
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200":
          description: xlsx file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet: {}
  /api/v1/dashboard/summary:
    get:
      tags: [Dashboard]
      security: [{ bearerAuth: [] }]
      summary: >
        Auth-only (no dedicated permission), strictly shop-scoped KPI summary:
        salesToday, salesThisMonth, lowStockCount, expiringCount, expiredCount,
        customerDueTotal, supplierDueTotal. "Today"/"this month" resolved in
        the shop's configured timezone.
      responses:
        "200": { description: Dashboard summary }
  /api/v1/languages:
    get:
      tags: [Languages]
      security: [{ bearerAuth: [] }]
      summary: List languages (perm language.index); optional ?status=active|inactive filter
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [active, inactive] }
      responses:
        "200": { description: Paginated languages }
    post:
      tags: [Languages]
      security: [{ bearerAuth: [] }]
      summary: Create a language (perm language.store); duplicate iso -> 409
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, iso]
              properties:
                name: { type: string }
                iso: { type: string, example: en }
                icon: { type: string, nullable: true }
                status: { type: string, enum: [active, inactive] }
      responses:
        "201": { description: Created }
        "409": { description: iso already exists }
  /api/v1/languages/{id}:
    get:
      tags: [Languages]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Language }
        "404": { description: Not found }
    patch:
      tags: [Languages]
      security: [{ bearerAuth: [] }]
      summary: Update basic fields (name/icon/status) — reuses perm language.store
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                icon: { type: string, nullable: true }
                status: { type: string, enum: [active, inactive] }
      responses:
        "200": { description: Updated }
    delete:
      tags: [Languages]
      security: [{ bearerAuth: [] }]
      summary: Delete a language (perm language.destroy)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Deleted }
  /api/v1/languages/{id}/terms:
    patch:
      tags: [Languages]
      security: [{ bearerAuth: [] }]
      summary: >
        Merge (not replace) partial translation terms into the language's
        terms map (perm language.terms.update).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [terms]
              properties:
                terms: { type: object, additionalProperties: true }
      responses:
        "200": { description: Updated language with merged terms }
  /api/v1/notifications:
    get:
      tags: [Notifications]
      security: [{ bearerAuth: [] }]
      summary: Inbox for the authenticated user (receiverId = currentUser), newest first, paginated
      responses:
        "200": { description: Paginated notifications }
        "400": { description: limit=0 or negative limit }
  /api/v1/notifications/unread-count:
    get:
      tags: [Notifications]
      security: [{ bearerAuth: [] }]
      summary: Count of the caller's unseen notifications (registered before /:id)
      responses:
        "200": { description: "{ unreadCount }" }
  /api/v1/notifications/seen-all:
    patch:
      tags: [Notifications]
      security: [{ bearerAuth: [] }]
      summary: Mark all of the caller's unseen notifications as seen (no-op if already empty)
      responses:
        "200": { description: Marked }
  /api/v1/notifications/{id}:
    get:
      tags: [Notifications]
      security: [{ bearerAuth: [] }]
      summary: Marks the notification as seen and returns its detail. 404 if nonexistent, 403 if not the receiver.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Notification detail }
        "403": { description: Not the receiver }
        "404": { description: Not found }
  /api/v1/notifications/{id}/seen:
    patch:
      tags: [Notifications]
      security: [{ bearerAuth: [] }]
      summary: Mark seen only, no detail payload (idempotent)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Marked }
        "403": { description: Not the receiver }
        "404": { description: Not found }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PosPrinterSettings:
      type: object
      required: [autoPrint, preferredPrinter, paperSize, receiptFooter]
      properties:
        autoPrint: { type: boolean }
        preferredPrinter: { type: string, nullable: true }
        paperSize: { type: string, enum: [A4, '80mm', '58mm'] }
        receiptFooter: { type: string, nullable: true }
tags:
  - name: Auth
  - name: Users
  - name: RBAC
  - name: Settings
  - name: PaymentMethods
  - name: Customers
  - name: Suppliers
  - name: Vendors
  - name: Categories
  - name: Catalog
  - name: Medicines
  - name: Purchases
  - name: Stock
  - name: POS
  - name: Invoices
  - name: Clinical
  - name: Accounting
  - name: Reports
  - name: Dashboard
  - name: Languages
  - name: Notifications
