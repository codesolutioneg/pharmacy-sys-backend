openapi: 3.0.3
info:
  title: Pharmacy Sys API
  version: 1.5.0
  description: >
    BP1 — Auth, Users, RBAC, Settings (Egypt-first defaults).
    BP2 — Customers, Suppliers, Vendors, Payment Methods, Catalog (Categories,
    Medicine Types, Units, Leaves) and Medicines.
    BP3 — Purchases (draft-cart + commit), Purchase Returns, Stock & Batches.
    BP4 — POS (cart + checkout), Invoices, Sale Returns, Invoice PDF/Email.
    BP5 — Clinical: Doctors, Patients, Lab Tests (global/no shop_id), and
    Prescriptions (shop-scoped, with a working PATCH fixing Laravel's broken
    update()).
    BP6 — Expenses & Accounting: Expense Categories/Expenses (shop-scoped,
    ledger-synced on update/delete), Account Types/Accounts/Ledger
    Transactions (global, manual JE support), and Trial Balance/Balance
    Sheet/Income Statement reports using conventional accounting.
    BP7 — Operational Reports (customer dues, supplier payables, sale/purchase,
    profit/loss — all shop-scoped, with .xlsx exports via exceljs), Dashboard
    summary (auth-only, shop-scoped, shop-timezone-aware), Notifications
    (personal inbox, auth-only), and Languages (i18n catalog with mergeable
    per-language terms).
servers:
  - url: https://api.demo.pharmacy.code-solution.org
    description: Production
  - url: http://localhost:3000
    description: Local
paths:
  /api/health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200": { description: Tokens + user }
        "401": { description: Invalid credentials }
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200": { description: New tokens }
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token
      responses:
        "200": { description: Logged out }
  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      responses:
        "200": { description: Always OK (no enumeration) }
  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      responses:
        "200": { description: Password updated }
  /api/v1/auth/me:
    get:
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      summary: Current user + permissions
      responses:
        "200": { description: User }
  /api/v1/auth/profile:
    patch:
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      summary: Update profile
      responses:
        "200": { description: Updated user }
  /api/v1/auth/password:
    patch:
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      summary: Change password
      responses:
        "200": { description: Password changed }
  /api/v1/users:
    get:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      summary: List users
      responses:
        "200": { description: Paginated users }
    post:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      summary: Create user
      responses:
        "201": { description: Created }
  /api/v1/users/{id}:
    get:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: User }
    patch:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated }
    delete:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Deleted }
  /api/v1/roles:
    get:
      tags: [RBAC]
      security: [{ bearerAuth: [] }]
      summary: List roles
      responses:
        "200": { description: Roles }
    post:
      tags: [RBAC]
      security: [{ bearerAuth: [] }]
      summary: Create role
      responses:
        "201": { description: Created }
  /api/v1/roles/{id}:
    get:
      tags: [RBAC]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Role with permissions }
    patch:
      tags: [RBAC]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated }
    delete:
      tags: [RBAC]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Deleted }
  /api/v1/permissions:
    get:
      tags: [RBAC]
      security: [{ bearerAuth: [] }]
      summary: Permission catalog grouped by module
      responses:
        "200": { description: Catalog }
  /api/v1/shop:
    get:
      tags: [Settings]
      security: [{ bearerAuth: [] }]
      summary: Current shop
      responses:
        "200": { description: Shop }
  /api/v1/settings/general:
    get:
      tags: [Settings]
      security: [{ bearerAuth: [] }]
      summary: General shop settings
      responses:
        "200": { description: Settings }
    patch:
      tags: [Settings]
      security: [{ bearerAuth: [] }]
      summary: Update general settings
      responses:
        "200": { description: Updated }
  /api/v1/settings/email:
    get:
      tags: [Settings]
      security: [{ bearerAuth: [] }]
      summary: Email/SMTP settings (password masked)
      responses:
        "200": { description: Settings }
    patch:
      tags: [Settings]
      security: [{ bearerAuth: [] }]
      summary: Update SMTP settings
      responses:
        "200": { description: Updated }
  /api/v1/settings/kv:
    get:
      tags: [Settings]
      security: [{ bearerAuth: [] }]
      summary: Key/value settings
      responses:
        "200": { description: KV }
    put:
      tags: [Settings]
      security: [{ bearerAuth: [] }]
      summary: Upsert KV setting
      responses:
        "200": { description: Saved }
  /api/v1/settings/pos-printer:
    get:
      tags: [Settings]
      security: [{ bearerAuth: [] }]
      summary: POS printer / receipt preferences (any authenticated user)
      description: >
        Stored as settings KV name `pos.printer` (JSON). Defaults when unset:
        autoPrint=false, preferredPrinter=null, paperSize=A4, receiptFooter=null.
      responses:
        "200":
          description: POS printer settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: '#/components/schemas/PosPrinterSettings'
    patch:
      tags: [Settings]
      security: [{ bearerAuth: [] }]
      summary: Update POS printer preferences (requires setting.generalSetting)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                autoPrint: { type: boolean }
                preferredPrinter: { type: string, nullable: true, maxLength: 255 }
                paperSize: { type: string, enum: [A4, '80mm', '58mm'] }
                receiptFooter: { type: string, nullable: true, maxLength: 500 }
      responses:
        "200":
          description: Updated POS printer settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: '#/components/schemas/PosPrinterSettings'
        "403": { description: Missing setting.generalSetting }
  /api/v1/payment-methods:
    get:
      tags: [PaymentMethods]
      security: [{ bearerAuth: [] }]
      summary: List payment methods
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200": { description: Paginated payment methods }
    post:
      tags: [PaymentMethods]
      security: [{ bearerAuth: [] }]
      summary: Create payment method
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                balance: { type: number }
      responses:
        "201": { description: Created }
        "409": { description: Name already in use }
  /api/v1/payment-methods/{id}:
    get:
      tags: [PaymentMethods]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Payment method }
    patch:
      tags: [PaymentMethods]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated }
    delete:
      tags: [PaymentMethods]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Deleted }
  /api/v1/payment-methods/{id}/deposits:
    post:
      tags: [PaymentMethods]
      security: [{ bearerAuth: [] }]
      summary: Deposit into a payment method balance
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount: { type: number, minimum: 0.01 }
      responses:
        "200": { description: Updated balance }
  /api/v1/customers:
    get:
      tags: [Customers]
      security: [{ bearerAuth: [] }]
      summary: List customers (shop-scoped)
      responses:
        "200": { description: Paginated customers }
    post:
      tags: [Customers]
      security: [{ bearerAuth: [] }]
      summary: Create customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, phone]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                address: { type: string, nullable: true }
                gender: { type: string, enum: [Male, Female] }
                age: { type: integer }
      responses:
        "201": { description: Created }
        "409": { description: Email or phone already in use for this shop }
  /api/v1/customers/{id}:
    get:
      tags: [Customers]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Customer }
    patch:
      tags: [Customers]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated }
    delete:
      tags: [Customers]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Deleted }
  /api/v1/customers/{id}/payments:
    post:
      tags: [Customers]
      security: [{ bearerAuth: [] }]
      summary: Pay down customer due balance
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, paymentMethodId]
              properties:
                amount: { type: number, minimum: 0.01 }
                paymentMethodId: { type: integer }
                invoiceId: { type: integer }
      responses:
        "200": { description: Updated customer with reduced due }
        "400": { description: Amount exceeds due or invalid payment method/invoice }
  /api/v1/suppliers:
    get:
      tags: [Suppliers]
      security: [{ bearerAuth: [] }]
      summary: List suppliers
      responses:
        "200": { description: Paginated suppliers }
    post:
      tags: [Suppliers]
      security: [{ bearerAuth: [] }]
      summary: Create supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phone]
              properties:
                name: { type: string }
                phone: { type: string }
                address: { type: string, nullable: true }
      responses:
        "201": { description: Created }
        "409": { description: Phone already in use for this shop }
  /api/v1/suppliers/{id}:
    get:
      tags: [Suppliers]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Supplier }
    patch:
      tags: [Suppliers]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated }
    delete:
      tags: [Suppliers]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Deleted }
  /api/v1/suppliers/{id}/payments:
    post:
      tags: [Suppliers]
      security: [{ bearerAuth: [] }]
      summary: Pay down supplier due from a payment method balance
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, paymentMethodId]
              properties:
                amount: { type: number, minimum: 0.01 }
                paymentMethodId: { type: integer }
                purchaseId: { type: integer }
      responses:
        "200": { description: Updated supplier with reduced due }
        "400": { description: Amount exceeds due or payment method balance insufficient }
  /api/v1/vendors:
    get:
      tags: [Vendors]
      security: [{ bearerAuth: [] }]
      summary: List vendors
      responses:
        "200": { description: Paginated vendors }
    post:
      tags: [Vendors]
      security: [{ bearerAuth: [] }]
      summary: Create vendor
      responses:
        "201": { description: Created }
  /api/v1/vendors/{id}:
    get:
      tags: [Vendors]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Vendor }
    patch:
      tags: [Vendors]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated }
    delete:
      tags: [Vendors]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Deleted }
  /api/v1/product-categories:
    get:
      tags: [Categories]
      security: [{ bearerAuth: [] }]
      summary: List product categories
      responses:
        "200": { description: Paginated categories }
    post:
      tags: [Categories]
      security: [{ bearerAuth: [] }]
      summary: Create product category (slug auto-generated from title)
      responses:
        "201": { description: Created }
  /api/v1/product-categories/{id}:
    get:
      tags: [Categories]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Category }
    patch:
      tags: [Categories]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated }
    delete:
      tags: [Categories]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Deleted }
  /api/v1/medicine-types:
    get:
      tags: [Catalog]
      security: [{ bearerAuth: [] }]
      summary: List medicine types
      responses:
        "200": { description: Paginated medicine types }
    post:
      tags: [Catalog]
      security: [{ bearerAuth: [] }]
      summary: Create medicine type
      responses:
        "201": { description: Created }
  /api/v1/medicine-types/{id}:
    patch:
      tags: [Catalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated }
    delete:
      tags: [Catalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Deleted }
  /api/v1/units:
    get:
      tags: [Catalog]
      security: [{ bearerAuth: [] }]
      summary: List units
      responses:
        "200": { description: Paginated units }
    post:
      tags: [Catalog]
      security: [{ bearerAuth: [] }]
      summary: Create unit
      responses:
        "201": { description: Created }
  /api/v1/units/{id}:
    patch:
      tags: [Catalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated }
    delete:
      tags: [Catalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Deleted }
  /api/v1/leaves:
    get:
      tags: [Catalog]
      security: [{ bearerAuth: [] }]
      summary: List leaves (pack/box conversion units)
      responses:
        "200": { description: Paginated leaves }
    post:
      tags: [Catalog]
      security: [{ bearerAuth: [] }]
      summary: Create leaf
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                amount: { type: integer, minimum: 1 }
      responses:
        "201": { description: Created }
  /api/v1/leaves/{id}:
    patch:
      tags: [Catalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated }
    delete:
      tags: [Catalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Deleted }
  /api/v1/medicines:
    get:
      tags: [Medicines]
      security: [{ bearerAuth: [] }]
      summary: List medicines (search, categoryId, supplierId filters)
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: categoryId
          schema: { type: integer }
        - in: query
          name: supplierId
          schema: { type: integer }
      responses:
        "200": { description: Paginated medicines }
    post:
      tags: [Medicines]
      security: [{ bearerAuth: [] }]
      summary: Create medicine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, genericName, qrCode, supplierId, status, description]
              properties:
                name: { type: string }
                genericName: { type: string }
                qrCode: { type: string }
                description: { type: string }
                status: { type: string, enum: [active, inactive] }
                supplierId: { type: integer }
                vendorId: { type: integer, nullable: true }
                price: { type: number }
                buyPrice: { type: number }
                categoryIds: { type: array, items: { type: integer } }
                barcodes: { type: array, items: { type: string } }
      responses:
        "201": { description: Created }
        "409": { description: QR code already in use for this shop }
  /api/v1/medicines/barcode:
    post:
      tags: [Medicines]
      security: [{ bearerAuth: [] }]
      summary: Suggest a unique EAN-13 barcode for this shop
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                prefix: { type: string }
      responses:
        "200": { description: Suggested barcode }
  /api/v1/medicines/{id}:
    get:
      tags: [Medicines]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Medicine }
    patch:
      tags: [Medicines]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated }
    delete:
      tags: [Medicines]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Deleted }
  /api/v1/purchases/drafts:
    post:
      tags: [Purchases]
      security: [{ bearerAuth: [] }]
      summary: Create an empty purchase draft (cart)
      responses:
        "201": { description: Draft created }
  /api/v1/purchases/drafts/{id}:
    get:
      tags: [Purchases]
      security: [{ bearerAuth: [] }]
      summary: Get a draft with server-computed totals
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Draft with computed totals }
    patch:
      tags: [Purchases]
      security: [{ bearerAuth: [] }]
      summary: Set supplier, payment method, paid amount, invoice discount
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                supplierId: { type: integer, nullable: true }
                paymentMethodId: { type: integer, nullable: true }
                paidAmount: { type: number }
                invoiceDiscount:
                  type: object
                  properties:
                    value: { type: number }
                    type: { type: string, enum: [percent, fixed] }
      responses:
        "200": { description: Updated draft }
  /api/v1/purchases/drafts/{id}/lines:
    post:
      tags: [Purchases]
      security: [{ bearerAuth: [] }]
      summary: Add or update a draft line (keyed by medicineId)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [medicineId, quantity, buyPrice]
              properties:
                medicineId: { type: integer }
                quantity: { type: integer, minimum: 1 }
                buyPrice: { type: number }
                price: { type: number }
                batchName: { type: string, nullable: true }
                expireDate: { type: string, format: date, nullable: true }
                discount: { type: number }
                discountType: { type: string, enum: [percent, fixed] }
      responses:
        "200": { description: Updated draft }
  /api/v1/purchases/drafts/{id}/lines/{lineId}:
    delete:
      tags: [Purchases]
      security: [{ bearerAuth: [] }]
      summary: Remove a draft line
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: lineId
          required: true
          schema: { type: string }
